<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-label="Leaderboard — Data Intelligence MVP">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a1f"/>
      <stop offset="100%" stop-color="#1f1538"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.85" r="0.6">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#glow)"/>

  <g opacity="0.25" stroke="#a855f7" stroke-width="1.2" fill="none">
    <circle cx="900" cy="140" r="6" fill="#a855f7" stroke="none"/>
    <circle cx="1000" cy="220" r="5" fill="#06b6d4" stroke="none"/>
    <circle cx="1080" cy="120" r="4" fill="#a855f7" stroke="none"/>
    <circle cx="950" cy="320" r="7" fill="#a855f7" stroke="none"/>
    <circle cx="1060" cy="340" r="3" fill="#06b6d4" stroke="none"/>
    <circle cx="1110" cy="240" r="4" fill="#06b6d4" stroke="none"/>
    <circle cx="870" cy="240" r="3" fill="#a855f7" stroke="none"/>
    <line x1="900" y1="140" x2="1000" y2="220"/>
    <line x1="900" y1="140" x2="870" y2="240"/>
    <line x1="900" y1="140" x2="1080" y2="120"/>
    <line x1="1000" y1="220" x2="1080" y2="120"/>
    <line x1="1000" y1="220" x2="1110" y2="240"/>
    <line x1="1000" y1="220" x2="950" y2="320"/>
    <line x1="950" y1="320" x2="1060" y2="340"/>
    <line x1="950" y1="320" x2="870" y2="240"/>
    <line x1="1110" y1="240" x2="1060" y2="340"/>
  </g>

  <g opacity="0.55" stroke="#06b6d4" stroke-width="2" fill="none">
    <polyline points="96,500 220,440 340,460 460,380 580,360 700,300"/>
  </g>
  <g fill="#06b6d4">
    <circle cx="96"  cy="500" r="4"/>
    <circle cx="220" cy="440" r="4"/>
    <circle cx="340" cy="460" r="4"/>
    <circle cx="460" cy="380" r="4"/>
    <circle cx="580" cy="360" r="4"/>
    <circle cx="700" cy="300" r="4"/>
  </g>

  <g transform="translate(96 220)">
    <rect x="0" y="0" width="56" height="4" fill="url(#accent)" rx="2"/>
    <text x="0" y="56" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="28" font-weight="500" fill="#94a3b8" letter-spacing="0.18em">DATA INTELLIGENCE MVP</text>
    <text x="-6" y="200" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="160" font-weight="700" fill="#f8fafc" letter-spacing="-0.04em">Leaderboard</text>
    <text x="0" y="260" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="400" fill="#cbd5e1" opacity="0.85">
      <tspan x="0" dy="0">Fuses fragmented public data into a unified knowledge graph,</tspan>
      <tspan x="0" dy="32">ready for LLM analysis. Web scraping + filings + APIs, reconciled.</tspan>
    </text>
  </g>
</svg>
