<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-label="Tenure — AI Knowledge Engine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#glow)"/>

  <g opacity="0.18" stroke="#06b6d4" stroke-width="1.2" fill="none">
    <circle cx="980" cy="180" r="6" fill="#06b6d4" stroke="none"/>
    <circle cx="1060" cy="120" r="4" fill="#8b5cf6" stroke="none"/>
    <circle cx="1100" cy="260" r="5" fill="#06b6d4" stroke="none"/>
    <circle cx="930" cy="280" r="3" fill="#8b5cf6" stroke="none"/>
    <circle cx="1020" cy="350" r="4" fill="#06b6d4" stroke="none"/>
    <line x1="980" y1="180" x2="1060" y2="120"/>
    <line x1="980" y1="180" x2="1100" y2="260"/>
    <line x1="980" y1="180" x2="930" y2="280"/>
    <line x1="1100" y1="260" x2="1020" y2="350"/>
    <line x1="930" y1="280" x2="1020" y2="350"/>
    <line x1="1060" y1="120" x2="1100" y2="260"/>
  </g>

  <g transform="translate(96 250)">
    <rect x="0" y="0" width="56" height="4" fill="url(#accent)" rx="2"/>
    <text x="0" y="56" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="28" font-weight="500" fill="#94a3b8" letter-spacing="0.18em">AI KNOWLEDGE ENGINE</text>
    <text x="-6" y="200" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="184" font-weight="700" fill="#f8fafc" letter-spacing="-0.04em">Tenure</text>
    <text x="0" y="260" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="400" fill="#cbd5e1" opacity="0.85">
      <tspan x="0" dy="0">Turns arbitrary document corpora into a personalized AI tutor.</tspan>
      <tspan x="0" dy="32">Hybrid retrieval. Pluggable personas. Multi-format ingestion at scale.</tspan>
    </text>
  </g>
</svg>
